<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard — vivahaa</title>
<meta name="description" content="Track your wedding plans, bookings, wishlist and budget in one place.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script>(function(){try{var t=localStorage.getItem("vivahaa_theme");if(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches){t="dark";}if(t){document.documentElement.setAttribute("data-theme",t);}var l=localStorage.getItem("vivahaa_lang");if(l==="hi"){document.documentElement.setAttribute("lang","hi");}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Petit+Formal+Script&family=Eczar:wght@500;600;700;800&family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<script>if(!localStorage.getItem('vivahaa_current_user')){location.href='login.html';}</script>
<div class="page-loader"><span class="loader loader-dark"></span></div>
<a href="#main" class="skip-link">Skip to content</a>
<header id="app-header" data-transparent="true"></header>

<main id="main">
  <section class="hero page-hero" style="min-height:32vh;">
    <div class="hero-pattern"></div>
    <div class="hero-illustration" data-illustration="reception"></div>
    <div class="container hero-inner" style="text-align:left;">
      <div class="flex gap-4" style="align-items:center;">
        <div class="avatar-badge" id="dashUserInitials" style="width:64px;height:64px;font-size:1.4rem;background:var(--grad-gold);color:#2B1810;"></div>
        <div>
          <p class="eyebrow mb-0" data-i18n="dashboard.welcome"></p>
          <h2 style="color:#FDF6EA;margin:0;" id="dashUserName"></h2>
        </div>
      </div>
    </div>
  </section>

  <section class="section" id="dashRoot">
    <div class="container">
      <div class="dash-shell">
        <aside class="dash-sidebar">
          <div class="dash-profile">
            <div class="avatar-badge" id="dashSidebarInitials" style="background:var(--grad-gold);color:#2B1810;"></div>
            <h4 class="mb-0" id="dashSidebarName" style="margin-top:10px;"></h4>
            <p class="form-hint mb-0" id="dashSidebarEmail"></p>
          </div>
          <div class="dash-nav">
            <button class="active" data-tab="overview"><i class="fa-solid fa-gauge"></i> <span data-i18n="dashboard.nav.overview"></span></button>
            <button data-tab="profile"><i class="fa-solid fa-user"></i> <span data-i18n="dashboard.nav.profile"></span></button>
            <button data-tab="plans"><i class="fa-solid fa-clipboard-list"></i> <span data-i18n="dashboard.nav.plans"></span></button>
            <button data-tab="bookings"><i class="fa-solid fa-calendar-check"></i> <span data-i18n="dashboard.nav.bookings"></span></button>
            <button data-tab="wishlist"><i class="fa-solid fa-heart"></i> <span data-i18n="dashboard.nav.wishlist"></span></button>
            <button data-tab="budget"><i class="fa-solid fa-sack-dollar"></i> <span data-i18n="dashboard.nav.budget"></span></button>
            <button data-tab="notifications"><i class="fa-solid fa-bell"></i> <span data-i18n="dashboard.nav.notifications"></span></button>
            <button data-tab="settings"><i class="fa-solid fa-gear"></i> <span data-i18n="dashboard.nav.settings"></span></button>
          </div>
          <hr style="border:none;border-top:1px solid var(--color-border);margin:var(--sp-4) 0;">
          <button id="dashLogoutBtn" style="width:100%;text-align:left;background:none;border:none;padding:12px 14px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:12px;font-weight:700;font-size:var(--fs-sm);color:var(--color-error);">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> <span data-i18n="nav.logout"></span>
          </button>
        </aside>

        <div>
          <!-- OVERVIEW -->
          <div class="dash-panel active" id="panel-overview">
            <h3 data-i18n="dashboard.overview.title"></h3>
            <div class="grid grid-4 stat-grid" style="margin-top:var(--sp-5);">
              <div class="stat-card"><div class="card-meta" data-i18n="dashboard.overview.daysToGo"></div><div class="num" id="statDays">—</div></div>
              <div class="stat-card"><div class="card-meta" data-i18n="dashboard.overview.totalBudget"></div><div class="num" id="statBudget">—</div></div>
              <div class="stat-card"><div class="card-meta" data-i18n="dashboard.overview.vendorsBooked"></div><div class="num" id="statVendors">—</div></div>
              <div class="stat-card"><div class="card-meta" data-i18n="dashboard.overview.wishlistCount"></div><div class="num" id="statWishlist">—</div></div>
            </div>
            <div class="grid grid-2" style="margin-top:var(--sp-6);">
              <div class="card"><div class="card-body">
                <h4 data-i18n="dashboard.nav.plans"></h4>
                <p class="form-hint" data-i18n="dashboard.plans.subtitle"></p>
                <a href="dashboard.html?tab=plans" class="btn btn-outline btn-sm" data-i18n="common.viewAll"></a>
              </div></div>
              <div class="card"><div class="card-body">
                <h4 data-i18n="dashboard.nav.bookings"></h4>
                <p class="form-hint" data-i18n="dashboard.bookings.subtitle"></p>
                <a href="dashboard.html?tab=bookings" class="btn btn-outline btn-sm" data-i18n="common.viewAll"></a>
              </div></div>
            </div>
          </div>

          <!-- PROFILE -->
          <div class="dash-panel" id="panel-profile">
            <h3 data-i18n="dashboard.profile.title"></h3>
            <p class="form-hint" data-i18n="dashboard.profile.subtitle"></p>
            <form id="profileForm" class="card" style="margin-top:var(--sp-5);">
              <div class="card-body">
                <div class="grid grid-2" style="gap:var(--sp-4);">
                  <div class="form-group"><label for="pf-fullname" data-i18n="auth.register.fullName"></label><input id="pf-fullname" class="form-control" name="fullName" data-validate="required"><span class="form-error"></span></div>
                  <div class="form-group"><label for="pf-email" data-i18n="auth.register.email"></label><input id="pf-email" class="form-control" name="email" disabled></div>
                  <div class="form-group"><label for="pf-phone" data-i18n="auth.register.phone"></label><input id="pf-phone" class="form-control" name="phone" data-validate="phone"><span class="form-error"></span></div>
                  <div class="form-group"><label for="pf-partner" data-i18n="dashboard.profile.partnerName"></label><input id="pf-partner" class="form-control" name="partnerName"></div>
                  <div class="form-group"><label for="pf-city" data-i18n="dashboard.profile.weddingCity"></label><input id="pf-city" class="form-control" name="weddingCity"></div>
                  <div class="form-group"><label for="pf-date" data-i18n="auth.register.weddingDate"></label><input id="pf-date" class="form-control" name="weddingDate" type="date"></div>
                  <div class="form-group"><label for="pf-guests" data-i18n="dashboard.profile.guestCount"></label><input id="pf-guests" class="form-control" name="guestCount" type="number"></div>
                </div>
                <button type="submit" class="btn btn-maroon" data-i18n="dashboard.profile.saveChanges"></button>
              </div>
            </form>
          </div>

          <!-- PLANS -->
          <div class="dash-panel" id="panel-plans">
            <div class="flex-between">
              <div><h3 class="mb-0" data-i18n="dashboard.plans.title"></h3><p class="form-hint" data-i18n="dashboard.plans.subtitle"></p></div>
              <a href="planner.html" class="btn btn-gold btn-sm"><i class="fa-solid fa-plus"></i> <span data-i18n="nav.planMyWedding"></span></a>
            </div>
            <div id="plansWrap" style="margin-top:var(--sp-5);"></div>
          </div>

          <!-- BOOKINGS -->
          <div class="dash-panel" id="panel-bookings">
            <h3 data-i18n="dashboard.bookings.title"></h3>
            <p class="form-hint" data-i18n="dashboard.bookings.subtitle"></p>
            <div class="card"><div class="card-body" id="bookingsWrap"></div></div>
          </div>

          <!-- WISHLIST -->
          <div class="dash-panel" id="panel-wishlist">
            <h3 data-i18n="dashboard.wishlist.title"></h3>
            <p class="form-hint" data-i18n="dashboard.wishlist.subtitle"></p>
            <div id="wishlistWrap" style="margin-top:var(--sp-5);"></div>
          </div>

          <!-- BUDGET -->
          <div class="dash-panel" id="panel-budget">
            <h3 data-i18n="dashboard.budget.title"></h3>
            <p class="form-hint" data-i18n="dashboard.budget.subtitle"></p>
            <div id="budgetWrap" style="margin-top:var(--sp-5);"></div>
          </div>

          <!-- NOTIFICATIONS -->
          <div class="dash-panel" id="panel-notifications">
            <h3 data-i18n="dashboard.notifications.title"></h3>
            <p class="form-hint" data-i18n="dashboard.notifications.subtitle"></p>
            <div class="card"><div class="card-body" id="notifWrap"></div></div>
          </div>

          <!-- SETTINGS -->
          <div class="dash-panel" id="panel-settings">
            <h3 data-i18n="dashboard.settings.title"></h3>
            <p class="form-hint" data-i18n="dashboard.settings.subtitle"></p>
            <div class="card" style="margin-top:var(--sp-5);"><div class="card-body">
              <h4 data-i18n="dashboard.settings.language"></h4>
              <div class="flex gap-3" style="margin-bottom:var(--sp-5);">
                <button class="btn btn-outline btn-sm" id="settingsLangEn">English</button>
                <button class="btn btn-outline btn-sm" id="settingsLangHi">हिंदी</button>
              </div>
              <h4 data-i18n="dashboard.settings.theme"></h4>
              <div class="flex gap-3" style="margin-bottom:var(--sp-5);">
                <button class="btn btn-outline btn-sm" id="settingsThemeLight"><i class="fa-solid fa-sun"></i> <span data-i18n="dashboard.settings.themeLight"></span></button>
                <button class="btn btn-outline btn-sm" id="settingsThemeDark"><i class="fa-solid fa-moon"></i> <span data-i18n="dashboard.settings.themeDark"></span></button>
              </div>
              <hr style="border:none;border-top:1px solid var(--color-border);margin:var(--sp-5) 0;">
              <h4 style="color:var(--color-error);" data-i18n="dashboard.settings.deleteAccount"></h4>
              <p class="form-hint" data-i18n="dashboard.settings.deleteWarning"></p>
              <button class="btn btn-outline btn-sm" id="deleteAccountBtn" style="border-color:var(--color-error);color:var(--color-error);" data-i18n="dashboard.settings.deleteAccount"></button>
            </div></div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<footer id="app-footer"></footer>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/illustrations.js"></script>
<script src="js/auth.js"></script>
<script src="js/forms.js"></script>
<script src="js/main.js"></script>
<script src="js/dashboard.js"></script>
<script>
  vivahaa.init("dashboard");
  document.getElementById("dashLogoutBtn").addEventListener("click", () => {
    vivahaaAuth.logout();
    location.href = "index.html";
  });
</script>
</body>
</html>
