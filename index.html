<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vivahaa — Premium Wedding Planning Across India</title>
<meta name="description" content="vivahaa is India's premium wedding planning platform — discover venues, vendors and curated packages, and plan your dream wedding in English or Hindi.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script>(function(){try{var t=localStorage.getItem("vivahaa_theme");if(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches){t="dark";}if(t){document.documentElement.setAttribute("data-theme",t);}var l=localStorage.getItem("vivahaa_lang");if(l==="hi"){document.documentElement.setAttribute("lang","hi");}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Petit+Formal+Script&family=Eczar:wght@500;600;700;800&family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page-loader"><span class="loader loader-dark"></span></div>
<a href="#main" class="skip-link">Skip to content</a>

<header id="app-header" data-transparent="true"></header>

<main id="main">

  <!-- HERO -->
  <section class="hero">
    <div class="hero-pattern"></div>
    <div class="hero-illustration" data-illustration="hero"></div>
    <div class="container hero-inner">
      <p class="eyebrow" data-i18n="home.hero.eyebrow"></p>
      <h1 data-i18n="home.hero.title"></h1>
      <p class="lead" data-i18n="home.hero.subtitle"></p>
      <p class="text-script" style="margin:var(--sp-2) 0 0;" data-i18n="home.hero.scriptTag"></p>
      <div class="hero-actions">
        <a href="planner.html" class="btn btn-gold btn-lg"><i class="fa-solid fa-heart"></i> <span data-i18n="home.hero.cta1"></span></a>
        <a href="venues.html" class="btn btn-outline btn-lg" data-i18n="home.hero.cta2"></a>
      </div>
      <div class="hero-stats">
        <div><strong data-i18n="home.hero.stat1Num"></strong><span data-i18n="home.hero.stat1Label"></span></div>
        <div><strong data-i18n="home.hero.stat2Num"></strong><span data-i18n="home.hero.stat2Label"></span></div>
        <div><strong data-i18n="home.hero.stat3Num"></strong><span data-i18n="home.hero.stat3Label"></span></div>
        <div><strong data-i18n="home.hero.stat4Num"></strong><span data-i18n="home.hero.stat4Label"></span></div>
      </div>
    </div>
  </section>

  <!-- SEARCH -->
  <div class="container">
    <form class="search-card reveal" id="heroSearchForm">
      <div class="search-field">
        <label for="heroCity" data-i18n="home.search.destinationLabel"></label>
        <select id="heroCity">
          <option value="" data-i18n="common.allCategories"></option>
          <option value="Mumbai">Mumbai</option><option value="Delhi">Delhi</option>
          <option value="Jaipur">Jaipur</option><option value="Udaipur">Udaipur</option>
          <option value="Goa">Goa</option><option value="Bengaluru">Bengaluru</option>
        </select>
      </div>
      <div class="search-field">
        <label for="heroType" data-i18n="home.search.typeLabel"></label>
        <select id="heroType">
          <option value="" data-i18n="common.allCategories"></option>
          <option value="banquet" data-i18n="venues.types.banquet"></option>
          <option value="resort" data-i18n="venues.types.resort"></option>
          <option value="palace" data-i18n="venues.types.palace"></option>
          <option value="lawn" data-i18n="venues.types.lawn"></option>
          <option value="beach" data-i18n="venues.types.beach"></option>
          <option value="hotel" data-i18n="venues.types.hotel"></option>
        </select>
      </div>
      <div class="search-field">
        <label for="heroDate" data-i18n="home.search.dateLabel"></label>
        <input type="date" id="heroDate">
      </div>
      <div class="search-field">
        <label for="heroGuests" data-i18n="home.search.guestsLabel"></label>
        <input type="number" id="heroGuests" min="10" placeholder="300">
      </div>
      <button type="submit" class="btn btn-maroon"><i class="fa-solid fa-magnifying-glass"></i> <span data-i18n="home.search.searchBtn"></span></button>
    </form>
  </div>

  <!-- CATEGORIES -->
  <section class="section">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow" style="justify-content:center;" data-i18n="home.categories.eyebrow"></p>
        <h2 data-i18n="home.categories.title"></h2>
        <p class="lead" style="margin:0 auto;" data-i18n="home.categories.subtitle"></p>
      </div>
      <div class="grid grid-4">
        <a href="services.html#venues" class="cat-card card reveal"><div class="cat-icon"><i class="fa-solid fa-building-columns"></i></div><h4 data-i18n="home.categories.venues"></h4><p data-i18n="home.categories.venuesDesc"></p></a>
        <a href="services.html#catering" class="cat-card card reveal"><div class="cat-icon"><i class="fa-solid fa-utensils"></i></div><h4 data-i18n="home.categories.catering"></h4><p data-i18n="home.categories.cateringDesc"></p></a>
        <a href="services.html#decoration" class="cat-card card reveal"><div class="cat-icon"><i class="fa-solid fa-seedling"></i></div><h4 data-i18n="home.categories.decoration"></h4><p data-i18n="home.categories.decorationDesc"></p></a>
        <a href="services.html#photography" class="cat-card card reveal"><div class="cat-icon"><i class="fa-solid fa-camera"></i></div><h4 data-i18n="home.categories.photography"></h4><p data-i18n="home.categories.photographyDesc"></p></a>
        <a href="services.html#music" class="cat-card card reveal"><div class="cat-icon"><i class="fa-solid fa-music"></i></div><h4 data-i18n="home.categories.music"></h4><p data-i18n="home.categories.musicDesc"></p></a>
        <a href="services.html#bridal" class="cat-card card reveal"><div class="cat-icon"><i class="fa-solid fa-gem"></i></div><h4 data-i18n="home.categories.bridal"></h4><p data-i18n="home.categories.bridalDesc"></p></a>
        <a href="services.html#invitations" class="cat-card card reveal"><div class="cat-icon"><i class="fa-solid fa-envelope-open-text"></i></div><h4 data-i18n="home.categories.invitations"></h4><p data-i18n="home.categories.invitationsDesc"></p></a>
        <a href="services.html#guests" class="cat-card card reveal"><div class="cat-icon"><i class="fa-solid fa-users"></i></div><h4 data-i18n="home.categories.guests"></h4><p data-i18n="home.categories.guestsDesc"></p></a>
      </div>
    </div>
  </section>

  <!-- FEATURED VENUES -->
  <section class="section section-alt">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow" style="justify-content:center;" data-i18n="home.venues.eyebrow"></p>
        <h2 data-i18n="home.venues.title"></h2>
        <p class="lead" style="margin:0 auto;" data-i18n="home.venues.subtitle"></p>
      </div>
      <div class="grid grid-3" id="featuredVenues"></div>
      <div class="text-center" style="margin-top:var(--sp-7);"><a href="venues.html" class="btn btn-outline" data-i18n="common.viewAll"></a></div>
    </div>
  </section>

  <!-- POPULAR CATERERS -->
  <section class="section">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow" style="justify-content:center;" data-i18n="home.caterers.eyebrow"></p>
        <h2 data-i18n="home.caterers.title"></h2>
        <p class="lead" style="margin:0 auto;" data-i18n="home.caterers.subtitle"></p>
      </div>
      <div class="grid grid-3" id="popularCaterers"></div>
    </div>
  </section>

  <!-- DECORATION STYLES -->
  <section class="section section-alt">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow" style="justify-content:center;" data-i18n="home.decoration.eyebrow"></p>
        <h2 data-i18n="home.decoration.title"></h2>
        <p class="lead" style="margin:0 auto;" data-i18n="home.decoration.subtitle"></p>
      </div>
      <div class="grid grid-4" id="decorationStyles"></div>
    </div>
  </section>

  <!-- MUSIC & ENTERTAINMENT -->
  <section class="section">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow" style="justify-content:center;" data-i18n="home.music.eyebrow"></p>
        <h2 data-i18n="home.music.title"></h2>
        <p class="lead" style="margin:0 auto;" data-i18n="home.music.subtitle"></p>
      </div>
      <div class="grid grid-4" id="musicServices"></div>
    </div>
  </section>

  <!-- PACKAGES PREVIEW -->
  <section class="section section-alt">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow" style="justify-content:center;" data-i18n="home.packages.eyebrow"></p>
        <h2 data-i18n="home.packages.title"></h2>
        <p class="lead" style="margin:0 auto;" data-i18n="home.packages.subtitle"></p>
      </div>
      <div class="grid grid-3">
        <div class="card package-card reveal">
          <div class="eyebrow" style="justify-content:center;" data-i18n="packages.silver.name"></div>
          <p data-i18n="packages.silver.desc"></p>
          <div class="package-price">₹8,50,000<span> +</span></div>
          <a href="packages.html" class="btn btn-outline btn-block" data-i18n="common.viewDetails"></a>
        </div>
        <div class="card package-card featured reveal">
          <span class="ribbon" data-i18n="packages.gold.badge"></span>
          <div class="eyebrow" style="justify-content:center;" data-i18n="packages.gold.name"></div>
          <p data-i18n="packages.gold.desc"></p>
          <div class="package-price">₹16,50,000<span> +</span></div>
          <a href="packages.html" class="btn btn-gold btn-block" data-i18n="common.viewDetails"></a>
        </div>
        <div class="card package-card reveal">
          <div class="eyebrow" style="justify-content:center;" data-i18n="packages.platinum.name"></div>
          <p data-i18n="packages.platinum.desc"></p>
          <div class="package-price">₹32,00,000<span> +</span></div>
          <a href="packages.html" class="btn btn-outline btn-block" data-i18n="common.viewDetails"></a>
        </div>
      </div>
    </div>
  </section>

  <!-- TESTIMONIALS -->
  <div class="divider-toran on-dark"></div>
  <section class="section section-dark">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow" style="justify-content:center;" data-i18n="home.testimonials.eyebrow"></p>
        <h2 data-i18n="home.testimonials.title"></h2>
      </div>
      <div class="grid grid-3" id="testimonialsWrap"></div>
    </div>
  </section>
  <div class="divider-toran on-dark divider-flip"></div>

  <!-- GALLERY PREVIEW -->
  <section class="section">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow" style="justify-content:center;" data-i18n="home.gallery.eyebrow"></p>
        <h2 data-i18n="home.gallery.title"></h2>
        <p class="lead" style="margin:0 auto;" data-i18n="home.gallery.subtitle"></p>
      </div>
      <div class="grid" id="galleryPreview" style="grid-template-columns: repeat(4, 1fr);"></div>
      <div class="text-center" style="margin-top:var(--sp-7);"><a href="gallery.html" class="btn btn-maroon" data-i18n="common.seeFullGallery"></a></div>
    </div>
  </section>

  <!-- CTA -->
  <section class="section-sm">
    <div class="container">
      <div class="section-cta reveal">
        <h2 data-i18n="home.cta.title"></h2>
        <p class="lead" style="margin:0 auto var(--sp-5);" data-i18n="home.cta.subtitle"></p>
        <a href="planner.html" class="btn btn-gold btn-lg" data-i18n="home.cta.btn"></a>
      </div>
    </div>
  </section>

</main>

<footer id="app-footer"></footer>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/illustrations.js"></script>
<script src="js/auth.js"></script>
<script src="js/forms.js"></script>
<script src="js/main.js"></script>
<script src="js/home.js"></script>
<script>
  document.getElementById("heroSearchForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const params = new URLSearchParams();
    const city = document.getElementById("heroCity").value;
    const type = document.getElementById("heroType").value;
    const guests = document.getElementById("heroGuests").value;
    if (city) params.set("city", city);
    if (type) params.set("type", type);
    if (guests) params.set("guests", guests);
    location.href = "venues.html" + (params.toString() ? "?" + params.toString() : "");
  });
  vivahaa.init("home");
</script>
</body>
</html>
