<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — vivahaa</title>
<meta name="description" content="Questions about planning your wedding? Reach the vivahaa team — we reply within one business day.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script>(function(){try{var t=localStorage.getItem("vivahaa_theme");if(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches){t="dark";}if(t){document.documentElement.setAttribute("data-theme",t);}var l=localStorage.getItem("vivahaa_lang");if(l==="hi"){document.documentElement.setAttribute("lang","hi");}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Petit+Formal+Script&family=Eczar:wght@500;600;700;800&family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page-loader"><span class="loader loader-dark"></span></div>
<a href="#main" class="skip-link">Skip to content</a>
<header id="app-header" data-transparent="true"></header>

<main id="main">
  <section class="hero page-hero">
    <div class="hero-pattern"></div>
    <div class="hero-illustration" data-illustration="invitations"></div>
    <div class="container hero-inner">
      <div class="breadcrumb"><a href="index.html" data-i18n="nav.home"></a><span>/</span><span data-i18n="nav.contact"></span></div>
      <p class="eyebrow" style="justify-content:center;" data-i18n="contact.hero.eyebrow"></p>
      <h1 data-i18n="contact.hero.title"></h1>
      <p class="lead" data-i18n="contact.hero.subtitle"></p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="grid grid-4" style="margin-bottom: var(--sp-8);">
        <div class="card text-center reveal"><div class="card-body">
          <div class="cat-icon" style="margin:0 auto var(--sp-3);"><i class="fa-solid fa-location-dot"></i></div>
          <h4 data-i18n="contact.info.visitTitle"></h4><p class="mb-0 form-hint" data-i18n="footer.address"></p>
        </div></div>
        <div class="card text-center reveal"><div class="card-body">
          <div class="cat-icon" style="margin:0 auto var(--sp-3);"><i class="fa-solid fa-phone"></i></div>
          <h4 data-i18n="contact.info.callTitle"></h4><p class="mb-0 form-hint" data-i18n="footer.phone"></p>
        </div></div>
        <div class="card text-center reveal"><div class="card-body">
          <div class="cat-icon" style="margin:0 auto var(--sp-3);"><i class="fa-solid fa-envelope"></i></div>
          <h4 data-i18n="contact.info.emailTitle"></h4><p class="mb-0 form-hint" data-i18n="footer.email"></p>
        </div></div>
        <div class="card text-center reveal"><div class="card-body">
          <div class="cat-icon" style="margin:0 auto var(--sp-3);"><i class="fa-solid fa-clock"></i></div>
          <h4 data-i18n="contact.info.hoursTitle"></h4><p class="mb-0 form-hint" data-i18n="contact.info.hours"></p>
        </div></div>
      </div>

      <div class="grid" style="grid-template-columns: 1.1fr 0.9fr; gap: var(--sp-8); align-items:start;">
        <div class="card reveal"><div class="card-body" style="padding: var(--sp-7);">
          <h3 data-i18n="contact.form.title"></h3>
          <form id="contactForm" class="stack" novalidate>
            <div class="grid grid-2" style="gap: var(--sp-4);">
              <div class="form-group">
                <label for="cf-name" data-i18n="contact.form.name"></label>
                <input id="cf-name" class="form-control" name="name" data-validate="required" data-i18n-placeholder="contact.form.namePlaceholder">
                <span class="form-error"></span>
              </div>
              <div class="form-group">
                <label for="cf-phone" data-i18n="contact.form.phone"></label>
                <input id="cf-phone" class="form-control" name="phone" data-validate="required phone" data-i18n-placeholder="contact.form.phonePlaceholder">
                <span class="form-error"></span>
              </div>
            </div>
            <div class="grid grid-2" style="gap: var(--sp-4);">
              <div class="form-group">
                <label for="cf-email" data-i18n="contact.form.email"></label>
                <input id="cf-email" class="form-control" name="email" data-validate="required email" data-i18n-placeholder="contact.form.emailPlaceholder">
                <span class="form-error"></span>
              </div>
              <div class="form-group">
                <label for="cf-city" data-i18n="contact.form.city"></label>
                <input id="cf-city" class="form-control" name="city" data-i18n-placeholder="contact.form.cityPlaceholder">
              </div>
            </div>
            <div class="form-group">
              <label for="cf-subject" data-i18n="contact.form.subject"></label>
              <input id="cf-subject" class="form-control" name="subject" data-i18n-placeholder="contact.form.subjectPlaceholder">
            </div>
            <div class="form-group">
              <label for="cf-message" data-i18n="contact.form.message"></label>
              <textarea id="cf-message" class="form-control" name="message" rows="4" data-validate="required minlen10" data-i18n-placeholder="contact.form.messagePlaceholder"></textarea>
              <span class="form-error"></span>
            </div>
            <button type="submit" class="btn btn-maroon btn-lg btn-block" id="contactSubmitBtn">
              <span data-i18n="contact.form.submit"></span>
            </button>
          </form>
        </div></div>

        <div class="reveal">
          <div class="section-head align-left" style="margin-bottom: var(--sp-5);">
            <p class="eyebrow" data-i18n="contact.faq.eyebrow"></p>
            <h3 data-i18n="contact.faq.title"></h3>
          </div>
          <div class="faq-item">
            <button class="faq-q"><span data-i18n="contact.faq.q1"></span><i class="fa-solid fa-plus"></i></button>
            <div class="faq-a"><p data-i18n="contact.faq.a1"></p></div>
          </div>
          <div class="faq-item">
            <button class="faq-q"><span data-i18n="contact.faq.q2"></span><i class="fa-solid fa-plus"></i></button>
            <div class="faq-a"><p data-i18n="contact.faq.a2"></p></div>
          </div>
          <div class="faq-item">
            <button class="faq-q"><span data-i18n="contact.faq.q3"></span><i class="fa-solid fa-plus"></i></button>
            <div class="faq-a"><p data-i18n="contact.faq.a3"></p></div>
          </div>
          <div class="faq-item">
            <button class="faq-q"><span data-i18n="contact.faq.q4"></span><i class="fa-solid fa-plus"></i></button>
            <div class="faq-a"><p data-i18n="contact.faq.a4"></p></div>
          </div>
          <div class="faq-item">
            <button class="faq-q"><span data-i18n="contact.faq.q5"></span><i class="fa-solid fa-plus"></i></button>
            <div class="faq-a"><p data-i18n="contact.faq.a5"></p></div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<footer id="app-footer"></footer>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/illustrations.js"></script>
<script src="js/auth.js"></script>
<script src="js/forms.js"></script>
<script src="js/main.js"></script>
<script>
  vivahaa.init("contact");
  document.addEventListener("vivahaa:ready", () => {
    const form = document.getElementById("contactForm");
    vivahaaForms.wireLiveValidation(form);
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (!vivahaaForms.validateForm(form)) return;
      const btn = document.getElementById("contactSubmitBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span>';
      setTimeout(() => {
        vivahaa.toast(I18N.t("toast.contactSuccess"), "success");
        form.reset();
        btn.disabled = false;
        btn.innerHTML = `<span data-i18n="contact.form.submit"></span>`;
        I18N.applyToDom(btn);
      }, 900);
    });
  });
</script>
</body>
</html>
