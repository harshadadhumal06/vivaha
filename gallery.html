<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Gallery — vivahaa</title>
<meta name="description" content="Real Indian weddings planned by vivahaa — decoration, mehendi, sangeet, ceremony, reception and bridal moments.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script>(function(){try{var t=localStorage.getItem("vivahaa_theme");if(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches){t="dark";}if(t){document.documentElement.setAttribute("data-theme",t);}var l=localStorage.getItem("vivahaa_lang");if(l==="hi"){document.documentElement.setAttribute("lang","hi");}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Petit+Formal+Script&family=Eczar:wght@500;600;700;800&family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page-loader"><span class="loader loader-dark"></span></div>
<a href="#main" class="skip-link">Skip to content</a>
<header id="app-header" data-transparent="true"></header>

<main id="main">
  <section class="hero page-hero">
    <div class="hero-pattern"></div>
    <div class="hero-illustration" data-illustration="sangeet"></div>
    <div class="container hero-inner">
      <div class="breadcrumb"><a href="index.html" data-i18n="nav.home"></a><span>/</span><span data-i18n="nav.gallery"></span></div>
      <p class="eyebrow" style="justify-content:center;" data-i18n="gallery.hero.eyebrow"></p>
      <h1 data-i18n="gallery.hero.title"></h1>
      <p class="lead" data-i18n="gallery.hero.subtitle"></p>
    </div>
  </section>

  <section class="section-sm">
    <div class="container">
      <div class="tab-row reveal" style="justify-content:center;">
        <button class="tab-btn gallery-tab active" data-cat="all" data-i18n="gallery.filters.all"></button>
        <button class="tab-btn gallery-tab" data-cat="decoration" data-i18n="gallery.filters.decoration"></button>
        <button class="tab-btn gallery-tab" data-cat="mehendi" data-i18n="gallery.filters.mehendi"></button>
        <button class="tab-btn gallery-tab" data-cat="sangeet" data-i18n="gallery.filters.sangeet"></button>
        <button class="tab-btn gallery-tab" data-cat="ceremony" data-i18n="gallery.filters.ceremony"></button>
        <button class="tab-btn gallery-tab" data-cat="reception" data-i18n="gallery.filters.reception"></button>
        <button class="tab-btn gallery-tab" data-cat="bridal" data-i18n="gallery.filters.bridal"></button>
      </div>
      <div class="grid" id="galleryGrid" style="grid-template-columns: repeat(4, 1fr);"></div>
    </div>
  </section>
</main>

<footer id="app-footer"></footer>

<div class="modal-overlay" id="lightboxModal">
  <div class="modal-box lightbox-box">
    <button class="modal-close" aria-label="Close" style="background:rgba(255,255,255,0.85);"><i class="fa-solid fa-xmark"></i></button>
    <div class="modal-body"></div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/illustrations.js"></script>
<script src="js/auth.js"></script>
<script src="js/forms.js"></script>
<script src="js/main.js"></script>
<script src="js/gallery.js"></script>
<script>vivahaa.init("gallery");</script>
</body>
</html>
