<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Vendors — vivahaa</title>
<meta name="description" content="Verified caterers, decorators, photographers, DJs, makeup artists and invitation designers for your Indian wedding.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script>(function(){try{var t=localStorage.getItem("vivahaa_theme");if(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches){t="dark";}if(t){document.documentElement.setAttribute("data-theme",t);}var l=localStorage.getItem("vivahaa_lang");if(l==="hi"){document.documentElement.setAttribute("lang","hi");}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Petit+Formal+Script&family=Eczar:wght@500;600;700;800&family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page-loader"><span class="loader loader-dark"></span></div>
<a href="#main" class="skip-link">Skip to content</a>
<header id="app-header" data-transparent="true"></header>

<main id="main">
  <section class="hero page-hero">
    <div class="hero-pattern"></div>
    <div class="hero-illustration" data-illustration="catering"></div>
    <div class="container hero-inner">
      <div class="breadcrumb"><a href="index.html" data-i18n="nav.home"></a><span>/</span><span data-i18n="nav.vendors"></span></div>
      <p class="eyebrow" style="justify-content:center;" data-i18n="vendors.hero.eyebrow"></p>
      <h1 data-i18n="vendors.hero.title"></h1>
      <p class="lead" data-i18n="vendors.hero.subtitle"></p>
    </div>
  </section>

  <section class="section-sm">
    <div class="container">
      <div class="tab-row reveal">
        <button class="tab-btn vendor-tab active" data-cat="all"><i class="fa-solid fa-border-all"></i> <span data-i18n="vendors.categories.all"></span></button>
        <button class="tab-btn vendor-tab" data-cat="caterers"><i class="fa-solid fa-utensils"></i> <span data-i18n="vendors.categories.caterers"></span></button>
        <button class="tab-btn vendor-tab" data-cat="decorators"><i class="fa-solid fa-seedling"></i> <span data-i18n="vendors.categories.decorators"></span></button>
        <button class="tab-btn vendor-tab" data-cat="photographers"><i class="fa-solid fa-camera"></i> <span data-i18n="vendors.categories.photographers"></span></button>
        <button class="tab-btn vendor-tab" data-cat="music"><i class="fa-solid fa-music"></i> <span data-i18n="vendors.categories.music"></span></button>
        <button class="tab-btn vendor-tab" data-cat="makeup"><i class="fa-solid fa-wand-magic-sparkles"></i> <span data-i18n="vendors.categories.makeup"></span></button>
        <button class="tab-btn vendor-tab" data-cat="invitations"><i class="fa-solid fa-envelope-open-text"></i> <span data-i18n="vendors.categories.invitations"></span></button>
      </div>

      <div class="card reveal" style="padding: var(--sp-5); margin-bottom: var(--sp-7);">
        <div class="grid" style="grid-template-columns: 1fr 2fr; gap: var(--sp-4); align-items:end;">
          <div class="search-field">
            <label for="filterVendorCity" data-i18n="vendors.filters.city"></label>
            <select id="filterVendorCity"></select>
          </div>
          <div class="search-field">
            <label for="filterVendorSearch" data-i18n="common.search"></label>
            <input type="text" id="filterVendorSearch" data-i18n-placeholder="vendors.filters.search">
          </div>
        </div>
      </div>

      <div class="grid grid-3" id="vendorsGrid"></div>
    </div>
  </section>
</main>

<footer id="app-footer"></footer>

<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <button class="modal-close" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
    <div class="modal-body"></div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/illustrations.js"></script>
<script src="js/auth.js"></script>
<script src="js/forms.js"></script>
<script src="js/main.js"></script>
<script src="js/listings.js"></script>
<script>vivahaa.init("vendors");</script>
</body>
</html>
