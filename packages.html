<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Packages — vivahaa</title>
<meta name="description" content="Four curated wedding packages — Silver, Gold, Platinum and Royal — fully customisable to your celebration.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script>(function(){try{var t=localStorage.getItem("vivahaa_theme");if(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches){t="dark";}if(t){document.documentElement.setAttribute("data-theme",t);}var l=localStorage.getItem("vivahaa_lang");if(l==="hi"){document.documentElement.setAttribute("lang","hi");}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Petit+Formal+Script&family=Eczar:wght@500;600;700;800&family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page-loader"><span class="loader loader-dark"></span></div>
<a href="#main" class="skip-link">Skip to content</a>
<header id="app-header" data-transparent="true"></header>

<main id="main">
  <section class="hero page-hero">
    <div class="hero-pattern"></div>
    <div class="hero-illustration" data-illustration="palace"></div>
    <div class="container hero-inner">
      <div class="breadcrumb"><a href="index.html" data-i18n="nav.home"></a><span>/</span><span data-i18n="nav.packages"></span></div>
      <p class="eyebrow" style="justify-content:center;" data-i18n="packages.hero.eyebrow"></p>
      <h1 data-i18n="packages.hero.title"></h1>
      <p class="lead" data-i18n="packages.hero.subtitle"></p>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <p class="text-center form-hint reveal" style="max-width:640px;margin:0 auto var(--sp-7);" data-i18n="packages.billing.perDay"></p>

      <div class="grid grid-4">
        <!-- SILVER -->
        <div class="card package-card reveal">
          <div class="eyebrow" style="justify-content:center;" data-i18n="packages.silver.name"></div>
          <p style="font-size:var(--fs-sm);" data-i18n="packages.silver.desc"></p>
          <div class="package-price">₹8,50,000<span> +</span></div>
          <ul class="package-features">
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.silver.f1"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.silver.f2"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.silver.f3"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.silver.f4"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.silver.f5"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.silver.f6"></span></li>
          </ul>
          <a href="planner.html" class="btn btn-outline btn-block" data-i18n="common.getStarted"></a>
        </div>

        <!-- GOLD -->
        <div class="card package-card featured reveal">
          <span class="ribbon" data-i18n="packages.gold.badge"></span>
          <div class="eyebrow" style="justify-content:center;" data-i18n="packages.gold.name"></div>
          <p style="font-size:var(--fs-sm);" data-i18n="packages.gold.desc"></p>
          <div class="package-price">₹16,50,000<span> +</span></div>
          <ul class="package-features">
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.gold.f1"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.gold.f2"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.gold.f3"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.gold.f4"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.gold.f5"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.gold.f6"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.gold.f7"></span></li>
          </ul>
          <a href="planner.html" class="btn btn-gold btn-block" data-i18n="common.getStarted"></a>
        </div>

        <!-- PLATINUM -->
        <div class="card package-card reveal">
          <div class="eyebrow" style="justify-content:center;" data-i18n="packages.platinum.name"></div>
          <p style="font-size:var(--fs-sm);" data-i18n="packages.platinum.desc"></p>
          <div class="package-price">₹32,00,000<span> +</span></div>
          <ul class="package-features">
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.platinum.f1"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.platinum.f2"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.platinum.f3"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.platinum.f4"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.platinum.f5"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.platinum.f6"></span></li>
            <li><i class="fa-solid fa-circle-check"></i><span data-i18n="packages.platinum.f7"></span></li>
          </ul>
          <a href="planner.html" class="btn btn-outline btn-block" data-i18n="common.getStarted"></a>
        </div>

        <!-- ROYAL -->
        <div class="card package-card reveal" style="background: var(--grad-maroon); color:#F5E9DC;">
          <div class="eyebrow" style="justify-content:center; color: var(--color-gold-light);" data-i18n="packages.royal.name"></div>
          <p style="font-size:var(--fs-sm); color: rgba(245,233,220,0.8);" data-i18n="packages.royal.desc"></p>
          <div class="package-price" style="color: var(--color-gold-light);">₹65,00,000<span style="color:rgba(245,233,220,0.6);"> +</span></div>
          <ul class="package-features" style="border-color: rgba(255,255,255,0.15);">
            <li style="border-color: rgba(255,255,255,0.12); color: rgba(245,233,220,0.85);"><i class="fa-solid fa-circle-check" style="color:var(--color-gold-light);"></i><span data-i18n="packages.royal.f1"></span></li>
            <li style="border-color: rgba(255,255,255,0.12); color: rgba(245,233,220,0.85);"><i class="fa-solid fa-circle-check" style="color:var(--color-gold-light);"></i><span data-i18n="packages.royal.f2"></span></li>
            <li style="border-color: rgba(255,255,255,0.12); color: rgba(245,233,220,0.85);"><i class="fa-solid fa-circle-check" style="color:var(--color-gold-light);"></i><span data-i18n="packages.royal.f3"></span></li>
            <li style="border-color: rgba(255,255,255,0.12); color: rgba(245,233,220,0.85);"><i class="fa-solid fa-circle-check" style="color:var(--color-gold-light);"></i><span data-i18n="packages.royal.f4"></span></li>
            <li style="border-color: rgba(255,255,255,0.12); color: rgba(245,233,220,0.85);"><i class="fa-solid fa-circle-check" style="color:var(--color-gold-light);"></i><span data-i18n="packages.royal.f5"></span></li>
            <li style="border-color: rgba(255,255,255,0.12); color: rgba(245,233,220,0.85);"><i class="fa-solid fa-circle-check" style="color:var(--color-gold-light);"></i><span data-i18n="packages.royal.f6"></span></li>
            <li style="border-color: rgba(255,255,255,0.12); color: rgba(245,233,220,0.85);"><i class="fa-solid fa-circle-check" style="color:var(--color-gold-light);"></i><span data-i18n="packages.royal.f7"></span></li>
            <li style="border-color: rgba(255,255,255,0.12); color: rgba(245,233,220,0.85);"><i class="fa-solid fa-circle-check" style="color:var(--color-gold-light);"></i><span data-i18n="packages.royal.f8"></span></li>
          </ul>
          <a href="planner.html" class="btn btn-gold btn-block" data-i18n="common.getStarted"></a>
        </div>
      </div>

      <div class="section-cta reveal" style="margin-top:var(--sp-8);">
        <h2 data-i18n="packages.billing.customCta"></h2>
        <a href="planner.html" class="btn btn-gold btn-lg" data-i18n="packages.billing.customBtn"></a>
      </div>
    </div>
  </section>
</main>

<footer id="app-footer"></footer>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/illustrations.js"></script>
<script src="js/auth.js"></script>
<script src="js/forms.js"></script>
<script src="js/main.js"></script>
<script>vivahaa.init("packages");</script>
</body>
</html>
