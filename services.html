<!DOCTYPE html>

<head>

<meta name="description" content="Venue sourcing, catering, decor, photography, music, bridal styling, invitations, guest management and budgeting tools — all coordinated by one team.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script>(function(){try{var t=localStorage.getItem("vivahaa_theme");if(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches){t="dark";}if(t){document.documentElement.setAttribute("data-theme",t);}var l=localStorage.getItem("vivahaa_lang");if(l==="hi"){document.documentElement.setAttribute("lang","hi");}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Petit+Formal+Script&family=Eczar:wght@500;600;700;800&family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page-loader"><span class="loader loader-dark"></span></div>
<a href="#main" class="skip-link">Skip to content</a>
<header id="app-header" data-transparent="true"></header>

  <section class="hero page-hero">
    <div class="hero-pattern"></div>
    <div class="hero-illustration" data-illustration="floral"></div>
    <div class="container hero-inner">
      <div class="breadcrumb"><a href="index.html" data-i18n="nav.home"></a><span>/</span><span data-i18n="nav.services"></span></div>
      <p class="eyebrow" style="justify-content:center;" data-i18n="services.hero.eyebrow"></p>
      <h1 data-i18n="services.hero.title"></h1>

    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="grid grid-3">

          <h3 data-i18n="services.s1Title"></h3><p data-i18n="services.s1Desc"></p>

          <a href="vendors.html" class="btn btn-ghost btn-sm" data-i18n="common.learnMore"></a>
        </div></div>
        <div class="card reveal" id="invitations"><div class="card-body">
          <div class="cat-icon" style="margin:0 0 var(--sp-4);"><i class="fa-solid fa-envelope-open-text"></i></div>
          <h3 data-i18n="services.s7Title"></h3><p data-i18n="services.s7Desc"></p>

        <div class="text-center reveal">
          <div class="cat-icon" style="margin:0 auto var(--sp-4); font-family: var(--font-display); font-size:1.4rem;">02</div>

    <div class="container">

        <p class="lead" style="margin:0 auto var(--sp-5);" data-i18n="home.cta.subtitle"></p>
        <a href="planner.html" class="btn btn-gold btn-lg" data-i18n="home.cta.btn"></a>
      </div>
