<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — vivahaa</title>
<meta name="description" content="Log in to your vivahaa account to continue planning your wedding.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script>(function(){try{var t=localStorage.getItem("vivahaa_theme");if(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches){t="dark";}if(t){document.documentElement.setAttribute("data-theme",t);}var l=localStorage.getItem("vivahaa_lang");if(l==="hi"){document.documentElement.setAttribute("lang","hi");}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Petit+Formal+Script&family=Eczar:wght@500;600;700;800&family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page-loader"><span class="loader loader-dark"></span></div>

<div class="auth-shell">
  <div class="auth-visual">
    <div class="hero-illustration" data-illustration="bridal" style="right:auto; left:-6%; bottom:-6%; width:80%; height:80%; opacity:0.35;"></div>
    <a href="index.html" class="brand" style="margin-bottom: var(--sp-8); color:#FDF6EA;">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 3C16 3 10 9 10 16c0 4 3 7 6 7s6-3 6-7C22 9 16 3 16 3Z" fill="currentColor" opacity="0.9"/><path d="M6 24c2.5-3 6-4 10-4s7.5 1 10 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="16" cy="27.5" r="1.4" fill="currentColor"/></svg>
      <span data-i18n="meta.siteName"></span>
    </a>
    <h2 data-i18n="auth.login.visualTitle"></h2>
    <p class="lead" style="color:rgba(253,246,234,0.82);" data-i18n="auth.login.visualDesc"></p>
    <div class="hero-stats" style="margin-top:var(--sp-8);">
      <div><strong data-i18n="home.hero.stat1Num"></strong><span data-i18n="home.hero.stat1Label"></span></div>
      <div><strong data-i18n="home.hero.stat2Num"></strong><span data-i18n="home.hero.stat2Label"></span></div>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-box">
      <div class="flex-between" style="margin-bottom: var(--sp-6);">
        <a href="index.html" class="btn btn-ghost btn-sm"><i class="fa-solid fa-arrow-left"></i> <span data-i18n="common.back"></span></a>
        <div class="lang-switch"><button data-lang="en">EN</button><button data-lang="hi">हि</button></div>
      </div>
      <p class="eyebrow" data-i18n="auth.login.eyebrow"></p>
      <h1 style="font-size:var(--fs-2xl);" data-i18n="auth.login.title"></h1>
      <p class="lead mb-0" style="margin-bottom:var(--sp-6);" data-i18n="auth.login.subtitle"></p>

      <div class="chip chip-outline" style="display:block;padding:var(--sp-3);margin-bottom:var(--sp-5);">
        <i class="fa-solid fa-circle-info"></i> Demo account: <strong>demo@vivahaa.in</strong> / <strong>demo1234</strong>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="li-email" data-i18n="auth.login.email"></label>
          <div class="input-wrap"><i class="fa-solid fa-envelope"></i>
            <input id="li-email" class="form-control" name="email" type="email" data-validate="required email" placeholder="you@example.com">
          </div>
          <span class="form-error"></span>
        </div>
        <div class="form-group">
          <label for="li-password" data-i18n="auth.login.password"></label>
          <div class="input-wrap"><i class="fa-solid fa-lock"></i>
            <input id="li-password" class="form-control" name="password" type="password" data-validate="required">
            <button type="button" class="toggle-visibility" aria-label="Show password"><i class="fa-solid fa-eye"></i></button>
          </div>
          <span class="form-error"></span>
        </div>
        <div class="flex-between" style="margin-bottom:var(--sp-5);">
          <label class="checkbox-row"><input type="checkbox" name="remember"><span data-i18n="auth.login.remember"></span></label>
          <a href="#" style="font-size:var(--fs-sm);font-weight:700;color:var(--color-maroon);" data-i18n="auth.login.forgot"></a>
        </div>
        <button type="submit" class="btn btn-maroon btn-lg btn-block" id="loginSubmitBtn"><span data-i18n="auth.login.submit"></span></button>
      </form>

      <div class="auth-divider"><span>OR</span></div>
      <div class="social-row">
        <button class="btn btn-outline"><i class="fa-brands fa-google"></i> Google</button>
        <button class="btn btn-outline"><i class="fa-brands fa-facebook"></i> Facebook</button>
      </div>

      <p class="text-center" style="margin-top:var(--sp-6);">
        <span data-i18n="auth.login.noAccount"></span>
        <a href="register.html" style="font-weight:800;color:var(--color-maroon);" data-i18n="auth.login.signupLink"></a>
      </p>
    </div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/illustrations.js"></script>
<script src="js/auth.js"></script>
<script src="js/forms.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener("vivahaa:ready", () => {
    const form = document.getElementById("loginForm");
    vivahaaForms.wireLiveValidation(form);
    vivahaaForms.wireVisibilityToggle();
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if (!vivahaaForms.validateForm(form)) return;
      const btn = document.getElementById("loginSubmitBtn");
      btn.disabled = true; btn.innerHTML = '<span class="loader"></span>';
      setTimeout(() => {
        const result = vivahaaAuth.login({ email: form.email.value.trim(), password: form.password.value });
        if (result.ok) {
          vivahaa.toast(I18N.t("toast.loginSuccess"), "success");
          const redirect = sessionStorage.getItem("vivahaa_redirect_after_login") || "dashboard.html";
          sessionStorage.removeItem("vivahaa_redirect_after_login");
          setTimeout(() => location.href = redirect, 700);
        } else {
          vivahaa.toast(I18N.t("toast.loginError"), "error");
          btn.disabled = false; btn.innerHTML = `<span data-i18n="auth.login.submit"></span>`; I18N.applyToDom(btn);
        }
      }, 600);
    });
  });
  vivahaa.init("login"); // no #app-header/#app-footer on this page, so shell injection safely no-ops
</script>
</body>
</html>
