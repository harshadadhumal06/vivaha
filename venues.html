<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Venues — vivahaa</title>
<meta name="description" content="Browse palaces, resorts, banquet halls and lawns across India's most loved wedding destinations.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script>(function(){try{var t=localStorage.getItem("vivahaa_theme");if(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches){t="dark";}if(t){document.documentElement.setAttribute("data-theme",t);}var l=localStorage.getItem("vivahaa_lang");if(l==="hi"){document.documentElement.setAttribute("lang","hi");}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Petit+Formal+Script&family=Eczar:wght@500;600;700;800&family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page-loader"><span class="loader loader-dark"></span></div>
<a href="#main" class="skip-link">Skip to content</a>
<header id="app-header" data-transparent="true"></header>

<main id="main">
  <section class="hero page-hero">
    <div class="hero-pattern"></div>
    <div class="hero-illustration" data-illustration="resort"></div>
    <div class="container hero-inner">
      <div class="breadcrumb"><a href="index.html" data-i18n="nav.home"></a><span>/</span><span data-i18n="nav.venues"></span></div>
      <p class="eyebrow" style="justify-content:center;" data-i18n="venues.hero.eyebrow"></p>
      <h1 data-i18n="venues.hero.title"></h1>
      <p class="lead" data-i18n="venues.hero.subtitle"></p>
    </div>
  </section>

  <section class="section-sm">
    <div class="container">
      <div class="card reveal" style="padding: var(--sp-5); margin-bottom: var(--sp-7);">
        <div class="grid" style="grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: var(--sp-4); align-items:end;">
          <div class="search-field">
            <label for="filterCity" data-i18n="venues.filters.city"></label>
            <select id="filterCity"></select>
          </div>
          <div class="search-field">
            <label for="filterType" data-i18n="venues.filters.type"></label>
            <select id="filterType">
              <option value="" data-i18n="common.allCategories"></option>
              <option value="banquet" data-i18n="venues.types.banquet"></option>
              <option value="resort" data-i18n="venues.types.resort"></option>
              <option value="palace" data-i18n="venues.types.palace"></option>
              <option value="lawn" data-i18n="venues.types.lawn"></option>
              <option value="beach" data-i18n="venues.types.beach"></option>
              <option value="hotel" data-i18n="venues.types.hotel"></option>
            </select>
          </div>
          <div class="search-field">
            <label for="filterCapacity" data-i18n="venues.filters.capacity"></label>
            <select id="filterCapacity">
              <option value="" data-i18n="common.allCategories"></option>
              <option value="100">100+</option>
              <option value="250">250+</option>
              <option value="400">400+</option>
              <option value="500">500+</option>
            </select>
          </div>
          <div class="search-field">
            <label for="filterSearch" data-i18n="common.search"></label>
            <input type="text" id="filterSearch" data-i18n-placeholder="venues.filters.search">
          </div>
          <button class="btn btn-ghost" id="clearFilters"><i class="fa-solid fa-rotate-left"></i> <span data-i18n="common.clear"></span></button>
        </div>
      </div>

      <div class="grid grid-3" id="venuesGrid"></div>
    </div>
  </section>
</main>

<footer id="app-footer"></footer>

<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <button class="modal-close" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
    <div class="modal-body"></div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/illustrations.js"></script>
<script src="js/auth.js"></script>
<script src="js/forms.js"></script>
<script src="js/main.js"></script>
<script src="js/listings.js"></script>
<script>vivahaa.init("venues");</script>
</body>
</html>
